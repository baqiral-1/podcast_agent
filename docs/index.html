<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Podcasts | Collections</title>
  <meta name="description" content="Collection hub for Agentic Podcasts audio series.">
  <style>
    :root {
      --body-bg-color: #10161b;
      --body-font-color: #ffffff;
      --primary-font: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --primary-body-font-size: 1.12rem;
      --primary-body-font-weight: 300;
      --primary-color: #9d57ea;
      --body-padding: 1.4375rem;
      --header-bg: #000000;
      --nav-color: #ffffff;
      --nav-color-hover: #9d57ea;
      --nav-font-size: 1rem;
      --header-padding: 1.25rem;
      --nav-horizontal-margin: 1.25rem;
      --max-width: 1180px;
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.08);
      --footer-border: rgba(255, 255, 255, 0.1);
      --footer-copy: rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
      border: 0 solid transparent;
    }

    html {
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(201, 165, 106, 0.08), transparent 34%),
        linear-gradient(180deg, #131a20 0%, #10161b 56%, #0c1115 100%);
      color: var(--body-font-color);
      font-family: var(--primary-font);
      font-size: var(--primary-body-font-size);
      font-weight: var(--primary-body-font-weight);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(calc(100% - (var(--body-padding) * 2)), var(--max-width));
      margin: 0 auto;
    }

    .site-header {
      background: var(--header-bg);
      padding: var(--header-padding) 0;
    }

    .site-header-inner {
      min-height: 3rem;
      display: flex;
      justify-content: center;
    }

    .brand-lockup {
      width: 15.625rem;
      margin: 0 auto;
      text-align: center;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 2.8rem;
      color: #ffffff;
      font-size: 1.42rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .site-nav {
      display: none;
    }

    .site-nav ul {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .site-nav a {
      display: inline-block;
      padding: 0.94rem var(--nav-horizontal-margin);
      color: var(--nav-color);
      font-size: var(--nav-font-size);
      font-weight: 700;
      text-transform: capitalize;
    }

    .site-nav a:hover,
    .site-nav a:focus-visible {
      color: var(--nav-color-hover);
    }

    .collection-section {
      padding: 5.2rem 0 4rem;
      background: transparent;
    }

    main {
      flex: 1 0 auto;
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    .collection-card {
      --card-accent: var(--primary-color);
      --card-icon-start: rgba(157, 87, 234, 0.92);
      --card-icon-end: rgba(240, 160, 75, 0.8);
      min-height: 9.72rem;
      padding: 0.95rem;
      border: 1px solid var(--card-border);
      border-radius: 1.1rem;
      background: var(--card-bg);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: border-color 0.2s ease, transform 0.2s ease, background-color 0.2s ease;
    }

    .collection-card-main {
      display: grid;
      gap: 0.55rem;
    }

    .collection-card-header {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 1rem;
    }

    .collection-card-copy {
      min-width: 0;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      text-align: left;
    }

    .collection-card:hover,
    .collection-card:focus-visible {
      border-color: var(--card-accent);
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }

    .collection-icon {
      width: 7.32rem;
      height: 7.32rem;
      border-radius: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    .collection-icon img {
      width: 108%;
      height: 108%;
      display: block;
      object-fit: cover;
    }

    .collection-title {
      margin: 0;
      color: #ffffff;
      font-size: 1.25rem;
      line-height: 1.2;
      font-weight: 700;
    }

    .collection-meta {
      margin: 0.38rem 0 0;
      color: var(--card-accent);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .site-footer {
      border-top: 1px solid var(--footer-border);
      background: #000000;
      margin-top: auto;
    }

    .site-footer-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      padding: 1.1rem 0 1.6rem;
      color: var(--footer-copy);
      font-size: 0.92rem;
    }

    .github-footer-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: inherit;
    }

    .github-footer-link:hover,
    .github-footer-link:focus-visible {
      color: #ffffff;
    }

    .github-mark {
      width: 1.1rem;
      height: 1.1rem;
      display: block;
      fill: currentColor;
    }

    @media screen and (max-width: 1024px) {
      html {
        font-size: 13px;
      }

      .collection-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media screen and (max-width: 767px) {
      html {
        font-size: 13px;
        line-height: 1.75;
      }

      .site-header {
        padding-bottom: 1.2rem;
      }

      .brand-lockup {
        width: 17.5rem;
      }

      .brand-mark {
        min-height: 3.4rem;
        font-size: 1.68rem;
        letter-spacing: 0.1em;
      }

      .collection-section {
        padding: 4.4rem 0 3.4rem;
      }

      .collection-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .collection-card {
        min-height: 0;
        padding: 1rem;
        border-radius: 1.2rem;
      }

      .collection-card-header {
        gap: 0.9rem;
      }

      .collection-icon {
        width: 6.4rem;
        height: 6.4rem;
      }

      .collection-title {
        font-size: 1.52rem;
        line-height: 1.22;
      }

      .collection-meta {
        margin-top: 0.45rem;
        font-size: 1rem;
        line-height: 1.35;
      }

    }
  </style>
</head>
