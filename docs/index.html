<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>India After Gandhi Audio</title>
  <style>
    :root {
      --bg: #000;
      --panel: #121212;
      --panel-soft: #1b1b1b;
      --text: #fff;
      --muted: #b3b3b3;
      --green: #1ed760;
      --line: rgba(255, 255, 255, 0.08);
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(141, 63, 18, 0.72), transparent 28%),
        linear-gradient(180deg, rgba(92, 43, 10, 0.88) 0%, rgba(24, 24, 24, 0.9) 32%, #000 100%);
      color: var(--text);
      font: 16px/1.5 "Helvetica Neue", Arial, sans-serif;
      padding: 24px;
    }

    main {
      width: min(1040px, 100%);
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 28px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .cover {
      aspect-ratio: 1;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.22), transparent 22%),
        linear-gradient(135deg, #cb7c2f 0%, #7f3412 52%, #31170d 100%);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.38);
    }

    .cover::before,
    .cover::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .cover::before {
      width: 240px;
      height: 240px;
      right: -70px;
      top: 26px;
    }

    .cover::after {
      width: 120px;
      height: 120px;
      left: -24px;
      bottom: 18px;
    }

    .cover-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.46));
    }

    .cover-kicker,
    .eyebrow {
      margin: 0;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .cover-title {
      margin: 10px 0 0;
      font-size: 2rem;
      line-height: 0.94;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .eyebrow {
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.8rem, 7vw, 5.8rem);
      line-height: 0.92;
      letter-spacing: -0.06em;
    }

    .meta {
      margin: 0 0 24px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .meta span {
      color: var(--muted);
      font-weight: 500;
    }

    .play-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    .play {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      border: 0;
      display: grid;
      place-items: center;
      background: var(--green);
      color: #000;
      font-size: 1.2rem;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(30, 215, 96, 0.24);
      cursor: pointer;
    }

    .play-note {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .player {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
    }

    audio {
      width: 100%;
      display: block;
      margin-bottom: 18px;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .timeline {
      width: 100%;
      margin: 0;
      accent-color: var(--green);
      cursor: pointer;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.88rem;
      font-variant-numeric: tabular-nums;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .links a {
      color: inherit;
      text-decoration: none;
    }

    .links a:hover {
      color: var(--text);
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }

      .cover {
        max-width: 360px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="cover">
      <div class="cover-inner">
        <p class="cover-kicker">Generated Episode</p>
        <h2 class="cover-title">India After Gandhi</h2>
      </div>
    </section>

    <section class="content">
      <p class="eyebrow">Latest Output Audio</p>
      <h1>Foundations of Indian Identity</h1>
      <p class="meta">India After Gandhi <span>•</span> Chapter 1</p>

      <div class="play-row">
        <button class="play" id="hero-play" type="button" aria-label="Play audio">▶</button>
        <div class="play-note">Final synthesized episode audio</div>
      </div>

      <section class="player">
        <audio id="audio" preload="metadata">
          <source src="./india-after-gandhi-latest-audio.mp3" type="audio/mpeg">
          Your browser does not support the audio element.
        </audio>
        <div class="controls">
          <input id="timeline" class="timeline" type="range" min="0" max="100" step="0.1" value="0" aria-label="Seek through audio">
          <div class="time-row">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>
        <div class="links">
          <a href="./india-after-gandhi-latest-audio.mp3">Open MP3</a>
        </div>
      </section>
    </section>
  </main>
  <script>
    const audio = document.getElementById("audio");
    const heroPlay = document.getElementById("hero-play");
    const timeline = document.getElementById("timeline");
    const currentTime = document.getElementById("current-time");
    const duration = document.getElementById("duration");

    function formatTime(value) {
      if (!Number.isFinite(value) || value < 0) {
        return "0:00";
      }
      const minutes = Math.floor(value / 60);
      const seconds = Math.floor(value % 60).toString().padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function syncPlayButton() {
      heroPlay.textContent = audio.paused ? "▶" : "❚❚";
      heroPlay.setAttribute("aria-label", audio.paused ? "Play audio" : "Pause audio");
    }

    function syncTimeline() {
      if (!audio.duration) {
        timeline.value = "0";
        currentTime.textContent = "0:00";
        duration.textContent = "0:00";
        return;
      }

      const percent = (audio.currentTime / audio.duration) * 100;
      timeline.value = String(percent);
      currentTime.textContent = formatTime(audio.currentTime);
      duration.textContent = formatTime(audio.duration);
    }

    heroPlay.addEventListener("click", () => {
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    });

    audio.addEventListener("play", syncPlayButton);
    audio.addEventListener("pause", syncPlayButton);
    audio.addEventListener("loadedmetadata", syncTimeline);
    audio.addEventListener("timeupdate", syncTimeline);
    audio.addEventListener("ended", syncPlayButton);

    timeline.addEventListener("input", () => {
      if (!audio.duration) {
        return;
      }
      audio.currentTime = (Number(timeline.value) / 100) * audio.duration;
    });

    syncPlayButton();
    syncTimeline();
  </script>
</body>
</html>
