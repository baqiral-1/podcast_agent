<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1220" viewBox="0 0 1400 1220" role="img" aria-labelledby="title desc">
  <title id="title">Podcast Agent Flow</title>
  <desc id="desc">A clean execution flow showing deterministic stages, LLM-backed sub-agents, and the output files written by each stage.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ec; }
      .title { font: 700 34px Georgia, serif; fill: #182126; }
      .subtitle { font: 16px Georgia, serif; fill: #516068; }
      .section { font: 700 16px Georgia, serif; fill: #182126; letter-spacing: 0.08em; }
      .box-title { font: 700 19px Georgia, serif; fill: #182126; }
      .box-body { font: 15px Georgia, serif; fill: #33434a; }
      .artifact-text { font: 14px Georgia, serif; fill: #5b4421; }
      .legend-text { font: 14px Georgia, serif; fill: #33434a; }
      .det { fill: #dcebd9; stroke: #58735e; stroke-width: 2; rx: 18; }
      .agent { fill: #dbe8f5; stroke: #5d7590; stroke-width: 2; rx: 18; }
      .artifact { fill: #f4e4cc; stroke: #9b7441; stroke-width: 2; rx: 14; }
      .log { fill: #e9dcf5; stroke: #7a5d91; stroke-width: 2; rx: 18; }
      .flow { stroke: #40525a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .link { stroke: #9b7441; stroke-width: 2.5; fill: none; stroke-dasharray: 7 7; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#40525a"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="1220"/>

  <text class="title" x="70" y="70">Execution Flow, Agents, and Output Files</text>
  <text class="subtitle" x="70" y="102">Blue boxes are LLM-backed sub-agents. Green boxes are deterministic orchestration stages. Orange boxes are persisted output files. Purple is the run-level log.</text>

  <text class="section" x="90" y="155">FLOW</text>
  <text class="section" x="900" y="155">OUTPUTS</text>

  <rect class="det" x="90" y="180" width="520" height="86"/>
  <text class="box-title" x="120" y="214">1. ingest-book</text>
  <text class="box-body" x="120" y="241">Read the raw source file, normalize metadata, and create the canonical book record.</text>

  <rect class="artifact" x="900" y="185" width="380" height="72"/>
  <text class="box-title" x="925" y="214">ingestion.json</text>
  <text class="artifact-text" x="925" y="238">BookIngestionResult with title, author, source path, and raw text.</text>

  <rect class="agent" x="90" y="315" width="520" height="110"/>
  <text class="box-title" x="120" y="350">2. structuring_agent</text>
  <text class="box-body" x="120" y="377">Chapter-first incremental structuring through the LLM interface.</text>
  <text class="box-body" x="120" y="401">Large chapters can be split into smaller windows before merge.</text>

  <rect class="artifact" x="900" y="320" width="380" height="92"/>
  <text class="box-title" x="925" y="349">structure.json</text>
  <text class="artifact-text" x="925" y="373">Merged BookStructure with chapters, chunk IDs, chunk text,</text>
  <text class="artifact-text" x="925" y="394">source offsets, and theme hints.</text>

  <rect class="det" x="90" y="470" width="520" height="86"/>
  <text class="box-title" x="120" y="504">3. index-book</text>
  <text class="box-body" x="120" y="531">Persist chunks, generate embeddings, and prepare retrieval for later stages.</text>

  <rect class="artifact" x="900" y="463" width="380" height="98"/>
  <text class="box-title" x="925" y="492">embeddings.json</text>
  <text class="artifact-text" x="925" y="516">Chunk embedding vectors. In DB-backed runs these also map to</text>
  <text class="artifact-text" x="925" y="537">Postgres `chunk_embeddings` rows.</text>

  <rect class="agent" x="90" y="605" width="520" height="86"/>
  <text class="box-title" x="120" y="639">4. analysis_agent</text>
  <text class="box-body" x="120" y="666">Infer themes, continuity arcs, notable claims, and episode clusters.</text>

  <rect class="artifact" x="900" y="610" width="380" height="72"/>
  <text class="box-title" x="925" y="639">analysis.json</text>
  <text class="artifact-text" x="925" y="663">BookAnalysis with themes, arcs, claims, and candidate clusters.</text>

  <rect class="agent" x="90" y="740" width="520" height="100"/>
  <text class="box-title" x="120" y="774">5. episode_planning_agent</text>
  <text class="box-body" x="120" y="801">Turn analysis into a SeriesPlan with long-form episode groupings,</text>
  <text class="box-body" x="120" y="823">beats, and claim requirements.</text>

  <rect class="artifact" x="900" y="748" width="380" height="78"/>
  <text class="box-title" x="925" y="777">series_plan.json</text>
  <text class="artifact-text" x="925" y="801">SeriesPlan with episodes, chapter groupings, beats, and themes.</text>

  <rect class="agent" x="90" y="890" width="520" height="88"/>
  <text class="box-title" x="120" y="924">6. writing_agent</text>
  <text class="box-body" x="120" y="951">Generate the narrated episode script using the plan plus retrieved chunks.</text>

  <rect class="artifact" x="900" y="885" width="380" height="76"/>
  <text class="box-title" x="925" y="914">script.json</text>
  <text class="artifact-text" x="925" y="938">EpisodeScript with narration, claims, citations, and segments.</text>

  <rect class="agent" x="90" y="1020" width="520" height="88"/>
  <text class="box-title" x="120" y="1054">7. grounding_validation_agent</text>
  <text class="box-body" x="120" y="1081">Validate every claim-bearing segment against cited evidence.</text>

  <rect class="artifact" x="900" y="1015" width="380" height="76"/>
  <text class="box-title" x="925" y="1044">grounding_report.json</text>
  <text class="artifact-text" x="925" y="1068">GroundingReport with pass/fail and claim-level assessments.</text>

  <rect class="agent" x="90" y="1145" width="520" height="60"/>
  <text class="box-title" x="120" y="1181">8. repair_agent if validation fails</text>

  <rect class="artifact" x="900" y="1128" width="380" height="76"/>
  <text class="box-title" x="925" y="1157">repair_attempt_&lt;n&gt;.json</text>
  <text class="artifact-text" x="925" y="1181">RepairResult for each retry, only present on failed validation.</text>

  <rect class="det" x="640" y="1020" width="210" height="88"/>
  <text class="box-title" x="668" y="1054">9. render-manifest</text>
  <text class="box-body" x="668" y="1081">Render only validated output.</text>

  <rect class="artifact" x="900" y="1105" width="380" height="76" transform="translate(0,-150)"/>
  <text class="box-title" x="925" y="984">render_manifest.json</text>
  <text class="artifact-text" x="925" y="1008">TTS-ready render output with text, SSML, speaker, and grounded claims.</text>

  <rect class="log" x="640" y="735" width="210" height="170"/>
  <text class="box-title" x="668" y="770">run.log</text>
  <text class="box-body" x="668" y="797">One log per run.</text>
  <text class="box-body" x="668" y="821">Records command info,</text>
  <text class="box-body" x="668" y="845">stage events, full prompts,</text>
  <text class="box-body" x="668" y="869">responses, and artifacts.</text>

  <path class="flow" d="M350 266 L350 315"/>
  <path class="flow" d="M350 425 L350 470"/>
  <path class="flow" d="M350 556 L350 605"/>
  <path class="flow" d="M350 691 L350 740"/>
  <path class="flow" d="M350 840 L350 890"/>
  <path class="flow" d="M350 978 L350 1020"/>
  <path class="flow" d="M610 1064 L640 1064"/>
  <path class="flow" d="M610 1064 Q625 1160 610 1175"/>

  <path class="link" d="M610 223 L900 223"/>
  <path class="link" d="M610 370 L900 370"/>
  <path class="link" d="M610 515 L900 515"/>
  <path class="link" d="M610 648 L900 648"/>
  <path class="link" d="M610 790 L900 790"/>
  <path class="link" d="M610 934 L900 934"/>
  <path class="link" d="M610 1060 L900 1060"/>
  <path class="link" d="M610 1175 L900 1165"/>
  <path class="link" d="M850 1060 L900 992"/>

  <path class="link" d="M745 735 L745 265"/>
  <path class="link" d="M745 735 L745 425"/>
  <path class="link" d="M745 735 L745 691"/>
  <path class="link" d="M745 905 L745 1020"/>

  <rect x="90" y="116" width="120" height="26" fill="#58735e" rx="13"/>
  <text x="122" y="134" fill="#fff" style="font:700 13px Georgia,serif;">Deterministic</text>
  <rect x="224" y="116" width="110" height="26" fill="#5d7590" rx="13"/>
  <text x="257" y="134" fill="#fff" style="font:700 13px Georgia,serif;">Sub-agent</text>
  <rect x="348" y="116" width="90" height="26" fill="#9b7441" rx="13"/>
  <text x="372" y="134" fill="#fff" style="font:700 13px Georgia,serif;">Artifact</text>
  <rect x="452" y="116" width="110" height="26" fill="#7a5d91" rx="13"/>
  <text x="483" y="134" fill="#fff" style="font:700 13px Georgia,serif;">run.log</text>
</svg>
